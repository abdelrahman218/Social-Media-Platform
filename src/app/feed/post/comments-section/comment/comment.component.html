<mat-card class="comment" appearance="outlined">
    <mat-card-header>
      <img [src]="imgUrl" onerror="this.src='default-avatar.jpg'" mat-card-avatar/>
      <mat-card-title><b>{{comment().user.name}}</b></mat-card-title>
      <mat-card-subtitle>{{comment().dateCreated | date: 'MMM d, y, h:mm a'}}</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
        <p>
            {{comment().text}}
        </p>
    </mat-card-content>
</mat-card>
