<form
  [formGroup]="newPostFormGroup"
  (ngSubmit)="addPost()"
  action=""
  method="post"
>
  <h2 mat-dialog-title color="primary" class="text">New Post</h2>
  <mat-dialog-content class="content">
    <mat-form-field>
      <mat-label class="text">Add Your Thoughts</mat-label>
      <textarea formControlName="postTextContent" matInput></textarea>
    </mat-form-field>
    <div class="upload-button-field text">
      <label for="post-pics" class="upload-button">+ Upload Pictures</label>
      <input
        type="file"
        #fileUploadElement
        (change)="onImagePicked(fileUploadElement)"
        style="display: none"
        name="post-pics"
        id="post-pics"
        accept="image/jpeg, image/png"
        multiple
      />
    </div>
  </mat-dialog-content>
  <mat-dialog-actions>
    <button type="button" class="text" color="warn" mat-stroked-button (click)="onCancel()">
      Cancel
    </button>
    <button type="submit" class="text" color="primary" mat-button cdkFocusInitial>
      Post
    </button>
  </mat-dialog-actions>
</form>
