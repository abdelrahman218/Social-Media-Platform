<app-side-feed [user]="user()"></app-side-feed>
<div>
<app-search></app-search>
</div>
<div>
  <button mat-button (click)="openNewPostDialog()" color="primary" class="text">
    <span class="material-icons"> add </span>
    <p>New Post</p>
  </button>
</div>
@for (post of posts(); track $index) {
<app-post [post]="post" />
}
@empty {
  <p class="noFriendsMessage text">
    Add Some Friends to be able to see their posts
  </p>
}
